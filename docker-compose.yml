services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: localdev   # local only; Cloud SQL uses Secret Manager
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema is applied by `emctl migrate` (Alembic), not by an init mount.
      # Migrations under emctl/migrations/ are the operative schema truth;
      # db/schema.sql is a reference only. Local bring-up is:
      #   docker compose up -d db && emctl migrate

volumes:
  pgdata: