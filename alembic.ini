# Alembic config for emctl.
#
# The database URL is NOT stored here; env.py reads DATABASE_URL from the
# environment (see emctl/config.py). `emctl migrate` builds its Config
# programmatically (emctl/alembic_cfg.py); this file exists so the `alembic`
# CLI (revision/downgrade/history) works in a checkout too.
[alembic]
script_location = emctl/migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
